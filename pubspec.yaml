name: selecto
description: AI-powered photo culling/selection for Windows, macOS, and Linux.
publish_to: "none"
version: 1.0.5+2

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Localization — provides MaterialLocalizations for non-English locales
  # (ko, …). Required: setting MaterialApp.locale to a locale the built-in
  # DefaultMaterialLocalizations doesn't cover (it only covers `en`) makes
  # every Material widget that needs localizations (PopupMenuButton,
  # showMenu, DropdownButton, Tooltip) crash without these delegates.
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Models / value objects
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Routing
  go_router: ^14.2.0

  # Local persistence
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # File picking + native dialogs
  file_selector: ^1.0.3

  # Image decoding / processing (off-thread via isolates)
  image: ^4.2.0

  # EXIF metadata parsing (pure Dart, header-only — no full decode) for the
  # viewer's info panel.
  exif: ^3.3.0

  # ONNX Runtime via FFI. Using `onnxruntime_v2` (a maintained fork of the
  # original gtbluesky `onnxruntime` package, which has been frozen at
  # 1.4.1 for 2 years and only supports ONNX IR ≤ 9). v2 follows ORT's
  # own versioning — 1.23.x bundles ORT 1.23 which supports IR v10+.
  # API surface is identical to the original (OrtSession, OrtValueTensor,
  # OrtRunOptions, OrtEnv) so the migration is import-only.
  onnxruntime_v2: ^1.23.2

  # Logging
  logging: ^1.2.0

  # Stable filename hashing for the RAW preview cache.
  crypto: ^3.0.3

  # System / desktop integration
  window_manager: ^0.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Codegen
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  drift_dev: ^2.18.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

  # Packaging — Windows MSIX installer. Used directly via
  # `dart run msix:create` and by flutter_distributor's windows/msix target.
  msix: ^3.16.0

  # App icon generation — one source PNG → Windows .ico + macOS iconset.
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/i18n/

# ---------------------------------------------------------------------------
# Windows MSIX installer config (read by the `msix` package).
#   dart run msix:create          → sideloadable .msix (test-signed)
#   dart run msix:create --store  → Microsoft Store submission package
# For real distribution, sign with a code-signing cert (see the commented
# certificate_* keys) so Windows SmartScreen doesn't flag an unknown
# publisher. See docs/DISTRIBUTION.md.
# ---------------------------------------------------------------------------
msix_config:
  display_name: Selecto
  publisher_display_name: fish-ken
  identity_name: com.fish-ken.selecto
  msix_version: 1.0.5.0
  description: AI-powered photo culling for desktop
  # The app reads and moves photos in user-chosen folders, so it needs broad
  # file-system access (a restricted capability — fine for sideloading; needs
  # justification for Store submission).
  capabilities: broadFileSystemAccess
  logo_path: assets/icon/app_icon.png
  # Do not prompt to install the test certificate in CI (non-interactive
  # environments return null from stdin, causing a type crash in msix ≥3.x).
  # For local development the certificate installs on first run anyway.
  install_certificate: false
  # --- code signing for distribution (uncomment + fill in) ---
  # certificate_path: windows\selecto.pfx
  # certificate_password: <password>
  # publisher: CN=fish-ken, O=fish-ken, C=KR   # must match the cert subject

# ---------------------------------------------------------------------------
# App icon generation (flutter_launcher_icons).
#   dart run tool/generate_app_icon.dart   # regenerate the placeholder source PNG
#   dart run flutter_launcher_icons        # → windows .ico + macOS iconset
# Linux desktop icons are set per packaging target (linux/packaging/*); the
# MSIX tile uses msix_config.logo_path above. All point at the same source.
# ---------------------------------------------------------------------------
flutter_launcher_icons:
  image_path: assets/icon/app_icon.png
  windows:
    generate: true
    icon_size: 256
  macos:
    generate: true
