name: selecto
description: AI-powered photo culling/selection for Windows, macOS, and Linux.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Models / value objects
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Routing
  go_router: ^14.2.0

  # Local persistence
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # File picking + native dialogs
  file_picker: ^8.0.5
  file_selector: ^1.0.3

  # Image decoding / processing (off-thread via isolates)
  image: ^4.2.0

  # ONNX Runtime via FFI. The `onnxruntime` package wraps the prebuilt
  # native libs; we run sessions inside isolates from our own worker pool.
  onnxruntime: ^1.4.1

  # Logging
  logging: ^1.2.0

  # System / desktop integration
  window_manager: ^0.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Codegen
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  drift_dev: ^2.18.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/models/
