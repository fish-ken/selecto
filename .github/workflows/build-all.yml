name: Build All (Release)

# OS별 워크플로(build-windows / build-macos / build-linux)를 한 번에
# 병렬로 호출해 설치본(.msix / .dmg / .deb)을 만드는 배치 진입점입니다.
#   - 수동: Actions 탭에서 "Run workflow" (아티팩트만)
#   - 자동: v* 태그 푸시 (예: v0.1.0) → 설치본을 GitHub Release 에 첨부
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # 릴리스 생성 + 에셋 업로드에 필요

jobs:
  windows:
    name: Windows (.msix)
    uses: ./.github/workflows/build-windows.yml
    secrets: inherit

  macos:
    name: macOS (.dmg)
    uses: ./.github/workflows/build-macos.yml
    secrets: inherit

  linux:
    name: Linux (.deb + .AppImage)
    uses: ./.github/workflows/build-linux.yml
    secrets: inherit

  release:
    name: Publish GitHub Release
    needs: [windows, macos, linux]
    # 태그 푸시일 때만 릴리스를 만듭니다(수동 실행은 아티팩트까지만).
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      # 릴리스 설명 템플릿(.github/release-notes.md)을 읽기 위한 체크아웃.
      # 아티팩트 다운로드보다 먼저 실행해야 합니다 — 체크아웃이 작업공간을
      # 정리(git clean)하면서 미추적 artifacts/ 디렉터리를 지울 수 있기 때문.
      - name: Checkout (릴리스 노트 템플릿)
        uses: actions/checkout@v5

      - name: Download all build artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      # 템플릿의 __DL_*__ 자리표시자를, 이번 태그 릴리스에 첨부될 "실제"
      # 파일명으로 만든 다운로드 링크로 치환합니다. 설치 파일명은 빌드 도구가
      # 정하고 보통 버전이 박히므로(예: selecto-1.0.3-macos.dmg) 태그만으로는
      # 알 수 없어, 다운로드된 아티팩트에서 실제 파일명을 찾아
      # [파일명](https://github.com/<repo>/releases/download/<태그>/<파일명>)
      # 형태의 링크를 만듭니다. 그 아래에 GitHub 자동 변경 로그가 붙습니다.
      - name: Render release notes (다운로드 링크 치환)
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          base="https://github.com/$REPO/releases/download/$TAG"
          # glob 패턴으로 첫 매칭 파일을 찾아 [파일명](URL) 링크 생성.
          # 못 찾으면 대시(—). (해당 플랫폼 빌드가 없을 때의 안전장치)
          link() {
            local f
            f=$(find artifacts -type f -name "$1" | head -n1)
            if [ -n "$f" ]; then
              printf '[%s](%s/%s)' "$(basename "$f")" "$base" "$(basename "$f")"
            else
              printf '—'
            fi
          }
          out="$RUNNER_TEMP/release-body.md"
          cp .github/release-notes.md "$out"
          # | 를 sed 구분자로 써서 URL 의 / 이스케이프를 피한다.
          sed -i \
            -e "s|__DL_WINDOWS__|$(link '*.msix')|g" \
            -e "s|__DL_MACOS__|$(link '*.dmg')|g" \
            -e "s|__DL_LINUX_DEB__|$(link '*.deb')|g" \
            -e "s|__DL_LINUX_APPIMAGE__|$(link '*.AppImage')|g" \
            -e "s|__TAG__|$TAG|g" \
            "$out"

      # body_path 의 내용이 자동 생성되는 "What's Changed / Full Changelog"
      # 바로 위에 pre-pend 됩니다(GitHub API 표준 동작).
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body_path: ${{ runner.temp }}/release-body.md
          generate_release_notes: true
          fail_on_unmatched_files: true
