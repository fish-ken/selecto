name: Build Linux (.deb + .AppImage)

# 단독 실행과 build-all.yml 에서의 호출(workflow_call) 모두 지원.
on:
  workflow_dispatch:
  workflow_call:

env:
  FLUTTER_CHANNEL: stable

jobs:
  build:
    name: Build Linux .deb + .AppImage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (LFS 모델 포함)
        uses: actions/checkout@v5
        with:
          lfs: true

      # Flutter Linux 데스크톱 빌드 의존성 + AppImage(appimagetool 은 자체가
      # AppImage 라 실행에 FUSE 가 필요) 의존성.
      - name: Install Linux desktop build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libfuse2

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      # linux/ 플랫폼 폴더는 커밋돼 있으므로 `flutter create` 불필요
      # (누락 파일은 `flutter pub get` 이 재생성).
      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Activate flutter_distributor
        run: |
          dart pub global activate flutter_distributor
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Package .deb + .AppImage
        run: flutter_distributor package --platform linux --targets deb,appimage

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: selecto-linux
          path: |
            dist/**/*.deb
            dist/**/*.AppImage
          if-no-files-found: error
