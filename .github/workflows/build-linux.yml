name: Build Linux (.deb + .AppImage)

# 단독 실행과 build-all.yml 에서의 호출(workflow_call) 모두 지원.
on:
  workflow_dispatch:
  workflow_call:
    secrets:
      LINUX_GPG_KEY:
        required: false
      LINUX_GPG_PASSPHRASE:
        required: false

env:
  FLUTTER_CHANNEL: stable
  # appimagetool 자체가 AppImage 이므로 CI 환경에서 FUSE 없이 실행되도록 설정.
  APPIMAGE_EXTRACT_AND_RUN: "1"

jobs:
  build:
    name: Build Linux .deb + .AppImage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (LFS 모델 포함)
        uses: actions/checkout@v5
        with:
          lfs: true

      # Flutter Linux 데스크톱 빌드 의존성 + AppImage 실행에 필요한 FUSE.
      - name: Install Linux desktop build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libfuse2

      # appimagetool 은 apt 패키지가 없어 GitHub 릴리즈에서 직접 내려받음.
      # 도구 자체도 AppImage 이므로 FUSE 없이 동작하도록
      # APPIMAGE_EXTRACT_AND_RUN=1 을 설정.
      - name: Install appimagetool
        run: |
          sudo wget -q \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O /usr/local/bin/appimagetool
          sudo chmod +x /usr/local/bin/appimagetool

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      # linux/ 플랫폼 폴더는 커밋돼 있으므로 `flutter create` 불필요
      # (누락 파일은 `flutter pub get` 이 재생성).
      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Activate flutter_distributor
        run: |
          dart pub global activate flutter_distributor
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Package .deb + .AppImage
        run: flutter_distributor package --platform linux --targets deb,appimage

      # LINUX_GPG_KEY 시크릿이 있으면 .deb 패키지에 GPG 서명을 추가합니다.
      # Linux 배포에서 선택 사항이지만 apt 저장소 배포 시 권장됩니다.
      #
      # GPG 키 준비 방법:
      #   1. gpg --full-generate-key  (RSA 4096 권장)
      #   2. gpg --export-secret-keys --armor <키ID> | base64 > gpg.b64
      #   3. GitHub Secrets 에 추가:
      #        LINUX_GPG_KEY        = gpg.b64 내용
      #        LINUX_GPG_PASSPHRASE = GPG 비밀번호
      - name: Sign .deb package
        if: ${{ secrets.LINUX_GPG_KEY != '' }}
        env:
          LINUX_GPG_KEY: ${{ secrets.LINUX_GPG_KEY }}
          LINUX_GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
        run: |
          sudo apt-get install -y dpkg-sig

          # GPG 키 임포트
          echo "$LINUX_GPG_KEY" | base64 --decode | \
            gpg --batch --import --passphrase "$LINUX_GPG_PASSPHRASE"

          # dist 아래 생성된 .deb 파일 전체에 서명
          for deb in dist/**/*.deb; do
            echo "서명 중: $deb"
            dpkg-sig --sign builder "$deb" \
              --gpg-options "--passphrase $LINUX_GPG_PASSPHRASE --batch --no-tty"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: selecto-linux
          path: |
            dist/**/*.deb
            dist/**/*.AppImage
          if-no-files-found: error
          retention-days: 7
