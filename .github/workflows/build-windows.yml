name: Build Windows (.msix)

# 단독 실행(Actions 탭의 "Run workflow")과, build-all.yml 에서의 호출
# (workflow_call) 을 모두 지원합니다.
on:
  workflow_dispatch:
  workflow_call:
    secrets:
      WINDOWS_CERT_BASE64:
        required: false
      WINDOWS_CERT_PASSWORD:
        required: false

env:
  FLUTTER_CHANNEL: stable

jobs:
  build:
    name: Build Windows MSIX
    runs-on: windows-latest
    steps:
      - name: Checkout (LFS 모델 포함)
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      # WINDOWS_CERT_BASE64 시크릿이 있으면 서명된 MSIX,
      # 없으면 테스트 자체서명 MSIX 를 생성합니다.
      #
      # 서명 인증서 준비 방법:
      #   1. 코드서명 인증서(.pfx) 구매 또는 Azure Trusted Signing 사용
      #   2. base64 인코딩: certutil -encode selecto.pfx selecto.b64
      #   3. GitHub Secrets 에 추가:
      #        WINDOWS_CERT_BASE64 = selecto.b64 의 내용 (헤더/푸터 제외)
      #        WINDOWS_CERT_PASSWORD = .pfx 비밀번호
      - name: Build MSIX installer
        shell: pwsh
        run: |
          if ("${{ secrets.WINDOWS_CERT_BASE64 }}" -ne "") {
            Write-Host "서명 인증서 있음 — 서명된 MSIX 빌드"
            $bytes = [Convert]::FromBase64String("${{ secrets.WINDOWS_CERT_BASE64 }}")
            [IO.File]::WriteAllBytes("windows\selecto.pfx", $bytes)
            dart run msix:create --output-path dist --output-name selecto `
              --certificate-path windows\selecto.pfx `
              --certificate-password "${{ secrets.WINDOWS_CERT_PASSWORD }}"
            Remove-Item windows\selecto.pfx
          } else {
            Write-Host "서명 인증서 없음 — 테스트 자체서명 MSIX 빌드"
            dart run msix:create --output-path dist --output-name selecto
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: selecto-windows-msix
          path: dist/*.msix
          if-no-files-found: error
          retention-days: 7
