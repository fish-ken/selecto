name: Build Windows (MSIX)

# 단독 실행(Actions 탭의 "Run workflow")과, build-all.yml 에서의 호출
# (workflow_call) 을 모두 지원합니다.
on:
  workflow_dispatch:
  workflow_call:

env:
  # 필요 시 특정 버전 고정으로 바꾸세요: flutter-version: '3.29.0'
  FLUTTER_CHANNEL: stable

jobs:
  build:
    name: Build Windows MSIX
    runs-on: windows-latest
    steps:
      - name: Checkout (LFS 모델 포함)
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      # windows/ 플랫폼 폴더는 저장소에 커밋돼 있고, 누락된 플러그인
      # 레지스트런트/ephemeral 은 `flutter pub get` 이 재생성하므로
      # `flutter create` 단계는 더 이상 필요하지 않습니다.
      - name: Install dependencies
        run: flutter pub get

      # *.g.dart (Riverpod/Drift/Freezed) 가 없으면 컴파일이 실패하므로 필수.
      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      # msix:create 가 내부적으로 `flutter build windows --release` 후 .msix 패키징.
      # 인증서 미지정 시 테스트 자체 서명됩니다(정식 배포는 pubspec 의
      # msix_config 에 코드서명 인증서를 넣으세요 — docs/DISTRIBUTION.md).
      - name: Build MSIX installer
        run: dart run msix:create --output-path dist --output-name selecto

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: selecto-windows-msix
          path: dist/*.msix
          if-no-files-found: error
          retention-days: 7
