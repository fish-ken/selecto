name: Build macOS

# 단독 실행과 build-all.yml 에서의 호출(workflow_call) 모두 지원.
on:
  workflow_dispatch:
  workflow_call:

env:
  FLUTTER_CHANNEL: stable
  ORG: com.fish-ken
  # actions/checkout·upload-artifact(Node 20) 의 deprecation 경고 제거 —
  # 모든 JS 액션을 Node 24 로 강제 실행. (2026-06-16 이후엔 기본값이라 무해)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build macOS release
    runs-on: macos-latest
    steps:
      - name: Checkout (LFS 모델 포함)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      # 플랫폼 폴더(macos/)는 커밋되지 않으므로 매번 생성.
      - name: Generate platform scaffolding (macos/)
        run: flutter create --platforms=macos --org=${{ env.ORG }} .

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS release
        run: flutter build macos --release

      # .app 은 심볼릭 링크가 포함된 번들이라 upload-artifact 로 바로 올리면
      # 깨질 수 있음 → ditto 로 번들을 보존하는 zip 으로 압축 후 업로드.
      - name: Package .app bundle
        run: |
          cd build/macos/Build/Products/Release
          APP=$(ls -d *.app | head -n1)
          ditto -c -k --keepParent "$APP" selecto-macos.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: selecto-macos
          path: build/macos/Build/Products/Release/selecto-macos.zip
          if-no-files-found: error
