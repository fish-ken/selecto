name: Build macOS (.dmg)

# 단독 실행과 build-all.yml 에서의 호출(workflow_call) 모두 지원.
on:
  workflow_dispatch:
  workflow_call:

env:
  FLUTTER_CHANNEL: stable

jobs:
  build:
    name: Build macOS .dmg
    runs-on: macos-latest
    steps:
      - name: Checkout (LFS 모델 포함)
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      # macos/ 플랫폼 폴더는 커밋돼 있으므로 `flutter create` 불필요.
      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      # dmg 패키징(appdmg) 도구.
      - name: Install dmg tooling
        run: npm install -g appdmg

      - name: Activate flutter_distributor
        run: |
          dart pub global activate flutter_distributor
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      # 서명/노터라이즈 없이 만든 .dmg 는 Gatekeeper 경고가 뜹니다(테스트용
      # 으론 동작). 정식 배포는 Apple 자격증명을 시크릿으로 추가하세요.
      - name: Package .dmg
        run: flutter_distributor package --platform macos --targets dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: selecto-macos-dmg
          path: dist/**/*.dmg
          if-no-files-found: error
          retention-days: 7
